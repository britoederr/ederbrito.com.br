apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ssl-certificate-letsencrypt
spec:
  acme:
    email: me@ederbrito.com.br
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: ssl-certificate-letsencrypt-account-key
    solvers:
    - http01:
        ingress:
          class: istio
