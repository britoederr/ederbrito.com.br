apiVersion: v1
kind: ServiceAccount
metadata:
  name: cadvisor
  namespace: observability
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: ederbrito-platform
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: observability
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: ederbrito-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor
        app.kubernetes.io/part-of: ederbrito-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cadvisor
      automountServiceAccountToken: false
      hostPID: true
      containers:
        - name: cadvisor
          image: ghcr.io/google/cadvisor:v0.60.3
          imagePullPolicy: IfNotPresent
          args:
            - --housekeeping_interval=30s
            - --store_container_labels=true
            - --whitelisted_container_labels=io.kubernetes.container.name,io.kubernetes.pod.name,io.kubernetes.pod.namespace,io.kubernetes.pod.uid
            - --disable_metrics=advtcp,cpu_topology,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: crio-sock
              mountPath: /var/run/crio
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: containers
              mountPath: /var/lib/containers
              readOnly: true
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
            - name: kmsg
              mountPath: /dev/kmsg
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      terminationGracePeriodSeconds: 30
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: crio-sock
          hostPath:
            path: /var/run/crio
        - name: sys
          hostPath:
            path: /sys
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: containers
          hostPath:
            path: /var/lib/containers
        - name: var-log
          hostPath:
            path: /var/log
        - name: disk
          hostPath:
            path: /dev/disk
        - name: kmsg
          hostPath:
            path: /dev/kmsg
      tolerations:
        - operator: Exists
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: observability
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: ederbrito-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
