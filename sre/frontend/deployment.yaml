
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ederbrito
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: frontend
          # Image tag is overwritten by `kubectl set image` in the deploy pipeline.
          # Fully qualified name required by CRI-O short-name enforcement (OKE 1.34+).
          image: docker.io/britoederr/ederbrito.com.br:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: ederbrito-frontend
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
