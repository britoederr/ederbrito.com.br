name: Oracle Kubernetes Engine Setup

on:
  pull_request:
    branches:
      - main
    paths:
      - sre/common/terraform/k8s/**
      - sre/common/terraform/dns/**
      - sre/common/kubernetes/**
      - .github/workflows/terraform-oke.yml
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - sre/common/terraform/k8s/**
      - sre/common/terraform/dns/**
      - sre/common/kubernetes/**
      - .github/workflows/terraform-oke.yml

env:
  TF_VAR_tenancy_ocid: ${{ secrets.TF_VAR_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.TF_VAR_USER_OCID }}
  TF_VAR_fingerprint: ${{ secrets.TF_VAR_FINGERPRINT }}
  TF_VAR_private_key: ${{ secrets.TF_VAR_PRIVATE_KEY }}
  TF_VAR_oci_bucket_name: ${{ secrets.TF_VAR_OCI_BUCKET_NAME }}
  TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
  TF_VAR_oci_compartment_id: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
  TF_VAR_compartment_ocid: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
  TF_VAR_region: "sa-saopaulo-1"
  TF_VAR_project_name: "ederbrito"
  TF_VAR_domain_name: "ederbrito.com.br"
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  CILIUM_VERSION: "1.17.6"
  CERT_MANAGER_VERSION: "v1.19.2"
  KUBECTL_VERSION: "v1.36.1"
  GATEWAY_API_VERSION: "v1.3.0"

jobs:
  terraform-k8s-preparation:
    name: Terraform Preparation Kubernetes Cluster
    runs-on: ubuntu-latest
    environment: prod

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: |
          cd sre/common/terraform/k8s
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          terraform init   -backend-config="tenancy_ocid=$TF_VAR_tenancy_ocid" \
            -backend-config="bucket=terraform-state" \
            -backend-config="namespace=grop2geoxikg" \
            -backend-config="key=ederbrito/common/oke" \
            -backend-config="user_ocid=$TF_VAR_user_ocid" \
            -backend-config="fingerprint=$TF_VAR_fingerprint" \
            -backend-config="private_key_path=oci_api_key.pem" \
            -backend-config="region=$TF_VAR_region"

      - name: Terraform Validate
        run: cd sre/common/terraform/k8s && terraform validate

      - name: Terraform Plan Kubernetes
        id: plan-k8s
        run: |
          cd sre/common/terraform/k8s
          terraform plan -out="tfplan-k8s-${ENVIRONMENT}-${GITHUB_SHA}" -lock=false

      - name: Upload Terraform Plan Kubernetes
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-k8s
          path: sre/common/terraform/k8s/tfplan-k8s-${{ env.ENVIRONMENT }}-${{ github.sha }}

  terraform-dns-validate-pr:
    name: Terraform Validate DNS (PR)
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository DNS
        uses: actions/checkout@v4
      - name: Setup Terraform DNS
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
      - name: Terraform Init DNS
        run: |
          cd sre/common/terraform/dns
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          terraform init   -backend-config="tenancy_ocid=$TF_VAR_tenancy_ocid" \
            -backend-config="bucket=terraform-state" \
            -backend-config="namespace=grop2geoxikg" \
            -backend-config="key=ederbrito/common/dns" \
            -backend-config="user_ocid=$TF_VAR_user_ocid" \
            -backend-config="fingerprint=$TF_VAR_fingerprint" \
            -backend-config="private_key_path=oci_api_key.pem" \
            -backend-config="region=$TF_VAR_region"
      - name: Terraform Validate DNS
        run: cd sre/common/terraform/dns && terraform validate

  terraform-k8s-apply:
    name: Terraform Apply Kubernetes Cluster
    runs-on: ubuntu-latest
    environment: prod
    needs: terraform-k8s-preparation
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-k8s

      - name: Terraform Init
        run: |
          cd sre/common/terraform/k8s
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          terraform init -backend-config="tenancy_ocid=$TF_VAR_tenancy_ocid" \
            -backend-config="bucket=terraform-state" \
            -backend-config="namespace=grop2geoxikg" \
            -backend-config="key=ederbrito/common/oke" \
            -backend-config="user_ocid=$TF_VAR_user_ocid" \
            -backend-config="fingerprint=$TF_VAR_fingerprint" \
            -backend-config="private_key_path=oci_api_key.pem" \
            -backend-config="region=$TF_VAR_region"

      - name: Terraform Apply
        run: |
          cp tfplan-k8s-${ENVIRONMENT}-${GITHUB_SHA} sre/common/terraform/k8s
          cd sre/common/terraform/k8s
          terraform apply -auto-approve -lock=false tfplan-k8s-${ENVIRONMENT}-${GITHUB_SHA}

  platform-bootstrap:
    name: Cilium Hubble Cert-Manager Observability
    runs-on: ubuntu-latest
    environment: prod
    needs: terraform-k8s-apply
    if: github.event_name == 'push'
    # OKE kubeconfig uses exec auth via `oci`; keep CLI auth available for all kubectl/helm steps.
    env:
      OCI_CLI_AUTH: api_key
      OCI_CLI_USER: ${{ secrets.TF_VAR_user_ocid }}
      OCI_CLI_TENANCY: ${{ secrets.TF_VAR_tenancy_ocid }}
      OCI_CLI_FINGERPRINT: ${{ secrets.TF_VAR_fingerprint }}
      OCI_CLI_REGION: ${{ secrets.TF_VAR_region }}
      OCI_CLI_KEY_FILE: ${{ github.workspace }}/oci_api_key.pem

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Install OCI CLI and configure kubeconfig
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          # Persist for later steps (export PATH only affects this step).
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export PATH="$PATH:$HOME/bin"

          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem

          CLUSTER_OCID=$(oci ce cluster list \
            --compartment-id $TF_VAR_compartment_ocid \
            --query 'data[?"lifecycle-state"==`ACTIVE` && name==`oke-ederbrito-cluster`].id | [0]' \
            --raw-output)

          mkdir -p $HOME/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id "$CLUSTER_OCID" \
            --file "$HOME/.kube/config" \
            --region "$TF_VAR_region" \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f "https://github.com/kubernetes-sigs/gateway-api/releases/download/${GATEWAY_API_VERSION}/standard-install.yaml"

      - name: Install Cilium + Hubble
        run: |
          helm repo add cilium https://helm.cilium.io/
          helm repo add kube-state-metrics https://kubernetes.github.io/kube-state-metrics
          helm repo update

          # Remove Flannel so Cilium can own CNI exclusively (OKE Flannel → Cilium path).
          kubectl -n kube-system delete daemonset kube-flannel-ds --ignore-not-found
          kubectl -n kube-system delete configmap kube-flannel-cfg --ignore-not-found

          helm upgrade --install cilium cilium/cilium \
            --namespace kube-system \
            --version "${CILIUM_VERSION}" \
            --set operator.replicas=1 \
            --set ipam.mode=kubernetes \
            --set tunnelProtocol=vxlan \
            --set kubeProxyReplacement=true \
            --set gatewayAPI.enabled=true \
            --set hubble.enabled=true \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true \
            --set hubble.metrics.enableOpenMetrics=true \
            --set prometheus.enabled=true \
            --set operator.prometheus.enabled=true \
            --wait --timeout 15m

          helm upgrade --install kube-state-metrics kube-state-metrics/kube-state-metrics \
            -n kube-system \
            --wait

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version "${CERT_MANAGER_VERSION}" \
            --set crds.enabled=true \
            --set config.enableGatewayAPI=true \
            --wait

      - name: Apply platform manifests
        run: |
          kubectl apply -f sre/common/kubernetes/namespace.yaml
          kubectl apply -f sre/common/kubernetes/
          kubectl -n kube-system rollout status deployment/hubble-relay --timeout=5m || true
          kubectl -n kube-system rollout status deployment/hubble-ui --timeout=5m || true

      - name: Wait for Cilium Gateway LoadBalancer IP
        run: |
          set -euo pipefail
          SVC_NAME="cilium-gateway-ederbrito-gateway"
          echo "Waiting for Service kube-system/${SVC_NAME} to get an EXTERNAL-IP..."
          for attempt in $(seq 1 60); do
            IP=$(kubectl get svc -n kube-system "${SVC_NAME}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [[ -n "${IP}" ]]; then
              echo "Gateway LoadBalancer IP: ${IP}"
              exit 0
            fi
            echo "Attempt ${attempt}/60: no EXTERNAL-IP yet"
            kubectl get svc -n kube-system "${SVC_NAME}" || true
            kubectl get gateway -n kube-system ederbrito-gateway -o wide || true
            sleep 15
          done
          echo "Timed out waiting for ${SVC_NAME} LoadBalancer IP"
          kubectl describe svc -n kube-system "${SVC_NAME}" || true
          kubectl describe gateway -n kube-system ederbrito-gateway || true
          exit 1

  terraform-dns-preparation:
    name: Terraform Preparation for DNS Creation
    runs-on: ubuntu-latest
    needs: platform-bootstrap
    if: github.event_name == 'push'
    environment: prod
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository DNS
        uses: actions/checkout@v4

      - name: Setup Terraform DNS
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init DNS
        run: |
          cd sre/common/terraform/dns
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          terraform init   -backend-config="tenancy_ocid=$TF_VAR_tenancy_ocid" \
            -backend-config="bucket=terraform-state" \
            -backend-config="namespace=grop2geoxikg" \
            -backend-config="key=ederbrito/common/dns" \
            -backend-config="user_ocid=$TF_VAR_user_ocid" \
            -backend-config="fingerprint=$TF_VAR_fingerprint" \
            -backend-config="private_key_path=oci_api_key.pem" \
            -backend-config="region=$TF_VAR_region"

      - name: Terraform Validate DNS
        run: cd sre/common/terraform/dns && terraform validate

      - name: Terraform Plan DNS
        id: plan-dns
        env:
          OCI_CLI_AUTH: api_key
          OCI_CLI_USER: ${{ secrets.TF_VAR_user_ocid }}
          OCI_CLI_TENANCY: ${{ secrets.TF_VAR_tenancy_ocid }}
          OCI_CLI_FINGERPRINT: ${{ secrets.TF_VAR_fingerprint }}
          OCI_CLI_REGION: ${{ secrets.TF_VAR_region }}
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH=$PATH:$HOME/bin
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          export OCI_CLI_KEY_FILE="$GITHUB_WORKSPACE/oci_api_key.pem"

          cd sre/common/terraform/dns
          terraform plan -out="tfplan-dns-${ENVIRONMENT}-${GITHUB_SHA}"

      - name: Upload Terraform Plan DNS
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dns
          path: sre/common/terraform/dns/tfplan-dns-${{ env.ENVIRONMENT }}-${{ github.sha }}

  terraform-dns-apply:
    name: Terraform Apply DNS
    runs-on: ubuntu-latest
    environment: prod
    needs: terraform-dns-preparation
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository DNS
        uses: actions/checkout@v4

      - name: Setup Terraform DNS
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Download Terraform Plan DNS
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dns

      - name: Terraform Init DNS
        run: |
          cd sre/common/terraform/dns
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          terraform init -backend-config="tenancy_ocid=$TF_VAR_tenancy_ocid" \
            -backend-config="bucket=terraform-state" \
            -backend-config="namespace=grop2geoxikg" \
            -backend-config="key=ederbrito/common/dns" \
            -backend-config="user_ocid=$TF_VAR_user_ocid" \
            -backend-config="fingerprint=$TF_VAR_fingerprint" \
            -backend-config="private_key_path=oci_api_key.pem" \
            -backend-config="region=$TF_VAR_region"

      - name: Terraform Apply DNS
        env:
          OCI_CLI_AUTH: api_key
          OCI_CLI_USER: ${{ secrets.TF_VAR_user_ocid }}
          OCI_CLI_TENANCY: ${{ secrets.TF_VAR_tenancy_ocid }}
          OCI_CLI_FINGERPRINT: ${{ secrets.TF_VAR_fingerprint }}
          OCI_CLI_REGION: ${{ secrets.TF_VAR_region }}
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH=$PATH:$HOME/bin
          echo "$TF_VAR_private_key" | sed 's/\\n/\n/g' > oci_api_key.pem
          chmod 600 oci_api_key.pem
          export OCI_CLI_KEY_FILE="$GITHUB_WORKSPACE/oci_api_key.pem"

          cp tfplan-dns-${ENVIRONMENT}-${GITHUB_SHA} sre/common/terraform/dns
          cd sre/common/terraform/dns
          terraform apply -auto-approve tfplan-dns-${ENVIRONMENT}-${GITHUB_SHA}
